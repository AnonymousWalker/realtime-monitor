<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realtime Monitor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0f0f1a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
        }

        .header {
            background: #16213e;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #1a2744;
        }

        .header h1 {
            font-size: 16px;
            font-weight: 600;
            color: #4ecca3;
        }

        .status-badge {
            font-size: 12px;
            padding: 3px 10px;
            border-radius: 12px;
            background: #1a3a2a;
            color: #4ecca3;
        }

        .status-badge.disconnected {
            background: #3a1a1a;
            color: #e94560;
        }

        .video-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            position: relative;
            overflow: hidden;
        }

        .video-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: transform 0.3s ease;
        }

        .video-container .no-signal {
            color: #555;
            font-size: 18px;
            text-align: center;
        }

        .controls {
            background: #16213e;
            padding: 12px 16px;
            border-top: 1px solid #1a2744;
        }

        .control-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .control-row:last-child { margin-bottom: 0; }

        .ctrl-btn {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 10px;
            background: #1a2744;
            color: #e0e0e0;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, transform 0.1s;
            flex-shrink: 0;
        }

        .ctrl-btn:hover { background: #243352; }
        .ctrl-btn:active { transform: scale(0.93); }
        .ctrl-btn.active { background: #4ecca3; color: #0f0f1a; }

        .zoom-group {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
            background: #1a2744;
            border-radius: 10px;
            padding: 0 12px;
            height: 44px;
        }

        .zoom-group label {
            font-size: 13px;
            color: #888;
            white-space: nowrap;
        }

        .zoom-group input[type="range"] {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 4px;
            background: #333;
            border-radius: 2px;
            outline: none;
        }

        .zoom-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #4ecca3;
            cursor: pointer;
        }

        .zoom-value {
            font-size: 13px;
            color: #4ecca3;
            min-width: 32px;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #555;
            padding: 0 2px;
        }

        audio { display: none; }

        @media (min-width: 768px) {
            .controls { padding: 14px 24px; }
            .header { padding: 12px 24px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Realtime Monitor</h1>
        <span id="statusBadge" class="status-badge disconnected">Connecting…</span>
    </div>

    <div class="video-container">
        <img id="videoFeed" alt="Video Feed" style="display:none;" />
        <div id="noSignal" class="no-signal">Connecting to camera…</div>
    </div>

    <div class="controls">
        <div class="control-row">
            <button id="btnAudio" class="ctrl-btn" title="Toggle Audio">&#x1f50a;</button>
            <button id="btnRotate" class="ctrl-btn" title="Rotate 90°">&#x21bb;</button>
            <button id="btnFlash" class="ctrl-btn" title="Toggle Flash">&#x1f4a1;</button>
            <button id="btnSwitch" class="ctrl-btn" title="Switch Camera">&#x1f504;</button>

            <div class="zoom-group">
                <label>Zoom</label>
                <input type="range" id="zoomSlider" min="1" max="10" step="0.1" value="1" />
                <span id="zoomValue" class="zoom-value">1.0x</span>
            </div>
        </div>

        <div class="info-bar">
            <span id="infoClients">Clients: —</span>
            <span id="infoRes">—</span>
        </div>
    </div>

    <audio id="audioPlayer" autoplay></audio>

    <script>
        const videoFeed = document.getElementById('videoFeed');
        const noSignal = document.getElementById('noSignal');
        const statusBadge = document.getElementById('statusBadge');
        const zoomSlider = document.getElementById('zoomSlider');
        const zoomValue = document.getElementById('zoomValue');
        const btnAudio = document.getElementById('btnAudio');
        const btnRotate = document.getElementById('btnRotate');
        const btnFlash = document.getElementById('btnFlash');
        const btnSwitch = document.getElementById('btnSwitch');
        const audioPlayer = document.getElementById('audioPlayer');
        const infoClients = document.getElementById('infoClients');
        const infoRes = document.getElementById('infoRes');

        let rotation = 0;
        let audioEnabled = false;
        let flashEnabled = false;

        const baseUrl = window.location.origin;

        function connectVideo() {
            videoFeed.src = baseUrl + '/video';
            videoFeed.style.display = 'block';
            noSignal.style.display = 'none';
            statusBadge.textContent = 'Live';
            statusBadge.classList.remove('disconnected');
        }

        videoFeed.addEventListener('load', function () {
            noSignal.style.display = 'none';
            infoRes.textContent = videoFeed.naturalWidth + 'x' + videoFeed.naturalHeight;
        });

        videoFeed.addEventListener('error', function () {
            statusBadge.textContent = 'Disconnected';
            statusBadge.classList.add('disconnected');
            noSignal.style.display = 'block';
            noSignal.textContent = 'Connection lost. Reconnecting…';
            videoFeed.style.display = 'none';
            setTimeout(connectVideo, 2000);
        });

        zoomSlider.addEventListener('input', function () {
            const val = parseFloat(this.value);
            zoomValue.textContent = val.toFixed(1) + 'x';
            fetch(baseUrl + '/api/zoom?level=' + val, { method: 'POST' }).catch(function () {});
        });

        btnRotate.addEventListener('click', function () {
            fetch(baseUrl + '/api/rotate', { method: 'POST' })
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    rotation = data.rotation || 0;
                    videoFeed.style.transform = 'rotate(' + rotation + 'deg)';
                })
                .catch(function () {});
        });

        btnAudio.addEventListener('click', function () {
            audioEnabled = !audioEnabled;
            btnAudio.classList.toggle('active', audioEnabled);
            if (audioEnabled) {
                audioPlayer.src = baseUrl + '/audio';
                audioPlayer.play().catch(function () {});
            } else {
                audioPlayer.pause();
                audioPlayer.removeAttribute('src');
            }
        });

        btnFlash.addEventListener('click', function () {
            fetch(baseUrl + '/api/flash', { method: 'POST' })
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    flashEnabled = data.flash;
                    btnFlash.classList.toggle('active', flashEnabled);
                })
                .catch(function () {});
        });

        btnSwitch.addEventListener('click', function () {
            fetch(baseUrl + '/api/switch', { method: 'POST' }).catch(function () {});
        });

        function pollStatus() {
            fetch(baseUrl + '/api/status')
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    infoClients.textContent = 'Clients: ' + (data.clients || 0);
                })
                .catch(function () {})
                .finally(function () {
                    setTimeout(pollStatus, 3000);
                });
        }

        connectVideo();
        pollStatus();
    </script>
</body>
</html>
