<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realtime Monitor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0f0f1a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
        }

        .header {
            background: #16213e;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #1a2744;
        }

        .header h1 { font-size: 16px; font-weight: 600; color: #4ecca3; }

        .status-badge {
            font-size: 12px;
            padding: 3px 10px;
            border-radius: 12px;
            background: #1a3a2a;
            color: #4ecca3;
        }

        .status-badge.disconnected {
            background: #3a1a1a;
            color: #e94560;
        }

        .video-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            position: relative;
            overflow: hidden;
        }

        .video-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: transform 0.3s ease;
        }

        .video-container .no-signal {
            color: #555;
            font-size: 18px;
            text-align: center;
        }

        .controls {
            background: #16213e;
            padding: 10px 14px 8px;
            border-top: 1px solid #1a2744;
        }

        .control-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .control-row:last-child { margin-bottom: 0; }

        .ctrl-btn {
            min-width: 40px;
            height: 40px;
            border: none;
            border-radius: 8px;
            background: #1a2744;
            color: #e0e0e0;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, transform 0.1s;
            flex-shrink: 0;
            padding: 0 6px;
        }

        .ctrl-btn:hover { background: #243352; }
        .ctrl-btn:active { transform: scale(0.93); }
        .ctrl-btn.active { background: #4ecca3; color: #0f0f1a; }

        .ctrl-btn.zoom-btn { font-size: 22px; font-weight: bold; width: 40px; }

        .zoom-display {
            font-size: 14px;
            color: #4ecca3;
            min-width: 44px;
            text-align: center;
            font-variant-numeric: tabular-nums;
            font-weight: 600;
        }

        .ctrl-btn.reset-btn {
            font-size: 12px;
            padding: 0 10px;
            color: #aaa;
        }

        .separator {
            width: 1px;
            height: 28px;
            background: #2a3a5a;
            flex-shrink: 0;
        }

        .volume-group {
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
            min-width: 0;
        }

        .volume-group input[type="range"] {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 4px;
            background: #333;
            border-radius: 2px;
            outline: none;
            min-width: 60px;
        }

        .volume-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #4ecca3;
            cursor: pointer;
        }

        .volume-value {
            font-size: 12px;
            color: #888;
            min-width: 30px;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        .res-group {
            display: flex;
            gap: 4px;
        }

        .res-btn {
            height: 32px;
            border: 1px solid #2a3a5a;
            border-radius: 6px;
            background: transparent;
            color: #888;
            font-size: 12px;
            padding: 0 10px;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .res-btn:hover { border-color: #4ecca3; color: #ccc; }
        .res-btn.active { background: #4ecca3; color: #0f0f1a; border-color: #4ecca3; font-weight: 600; }

        .vu-meter {
            position: absolute;
            right: 10px;
            top: 10px;
            bottom: 10px;
            width: 22px;
            display: flex;
            flex-direction: column-reverse;
            gap: 2px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 4px;
            padding: 3px;
        }

        .vu-seg {
            flex: 1;
            border-radius: 2px;
            opacity: 0.12;
            transition: opacity 0.08s;
        }

        .vu-seg.lit { opacity: 1; }

        .vu-seg.g { background: #4ecca3; }
        .vu-seg.y { background: #f0c040; }
        .vu-seg.r { background: #e94560; }

        .info-bar {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #555;
            padding: 2px 2px 0;
        }

        @media (min-width: 768px) {
            .controls { padding: 12px 24px 10px; }
            .header { padding: 12px 24px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Realtime Monitor</h1>
        <span id="statusBadge" class="status-badge disconnected">Connecting…</span>
    </div>

    <div class="video-container">
        <img id="videoFeed" alt="Video Feed" style="display:none;" />
        <div id="noSignal" class="no-signal">Connecting to camera…</div>
        <div class="vu-meter" id="vuMeter"></div>
    </div>

    <div class="controls">
        <!-- Row 1: Audio, Volume, utility buttons -->
        <div class="control-row">
            <button id="btnAudio" class="ctrl-btn" title="Toggle Audio">&#x1f50a;</button>
            <div class="volume-group">
                <input type="range" id="volumeSlider" min="0" max="150" step="5" value="80" />
                <span id="volumeValue" class="volume-value">80%</span>
            </div>
            <div class="separator"></div>
            <button id="btnRotate" class="ctrl-btn" title="Rotate 90°">&#x21bb;</button>
            <button id="btnFlash" class="ctrl-btn" title="Toggle Flash">&#x1f4a1;</button>
            <button id="btnSwitch" class="ctrl-btn" title="Switch Camera">&#x1f504;</button>
        </div>

        <!-- Row 2: Zoom controls + Resolution -->
        <div class="control-row">
            <button id="btnZoomOut" class="ctrl-btn zoom-btn" title="Zoom Out">&minus;</button>
            <span id="zoomDisplay" class="zoom-display">1.0x</span>
            <button id="btnZoomIn" class="ctrl-btn zoom-btn" title="Zoom In">+</button>
            <button id="btnZoomReset" class="ctrl-btn reset-btn" title="Reset Zoom">Reset</button>
            <div class="separator"></div>
            <div class="res-group">
                <button class="res-btn" data-res="480p">480p</button>
                <button class="res-btn active" data-res="720p">720p</button>
            </div>
        </div>

        <div class="info-bar">
            <span id="infoClients">Clients: —</span>
        </div>
    </div>

    <script>
        var videoFeed = document.getElementById('videoFeed');
        var noSignal = document.getElementById('noSignal');
        var statusBadge = document.getElementById('statusBadge');
        var btnAudio = document.getElementById('btnAudio');
        var volumeSlider = document.getElementById('volumeSlider');
        var volumeValue = document.getElementById('volumeValue');
        var btnRotate = document.getElementById('btnRotate');
        var btnFlash = document.getElementById('btnFlash');
        var btnSwitch = document.getElementById('btnSwitch');
        var btnZoomIn = document.getElementById('btnZoomIn');
        var btnZoomOut = document.getElementById('btnZoomOut');
        var btnZoomReset = document.getElementById('btnZoomReset');
        var zoomDisplay = document.getElementById('zoomDisplay');
        var infoClients = document.getElementById('infoClients');
        var resButtons = document.querySelectorAll('.res-btn');

        var rotation = 0;
        var audioEnabled = false;
        var flashEnabled = false;
        var currentZoom = 1.0;

        var baseUrl = window.location.origin;

        // ── Video ──────────────────────────────────────────────
        function connectVideo() {
            videoFeed.src = baseUrl + '/video';
            videoFeed.style.display = 'block';
            noSignal.style.display = 'none';
            statusBadge.textContent = 'Live';
            statusBadge.classList.remove('disconnected');
        }

        videoFeed.addEventListener('load', function () {
            noSignal.style.display = 'none';
        });

        videoFeed.addEventListener('error', function () {
            statusBadge.textContent = 'Disconnected';
            statusBadge.classList.add('disconnected');
            noSignal.style.display = 'block';
            noSignal.textContent = 'Connection lost. Reconnecting…';
            videoFeed.style.display = 'none';
            setTimeout(connectVideo, 2000);
        });

        // ── Audio (Web Audio API with polling) ───────────────────
        var audioCtx = null;
        var gainNode = null;
        var nextPlayTime = 0;
        var SAMPLE_RATE = 16000;
        var audioPollTimer = null;

        function initAudioContext() {
            if (audioCtx) return;
            var AC = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AC({ sampleRate: SAMPLE_RATE });
            gainNode = audioCtx.createGain();
            gainNode.connect(audioCtx.destination);
            gainNode.gain.value = parseInt(volumeSlider.value) / 100;
        }

        function startAudio() {
            initAudioContext();
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            nextPlayTime = 0;
            pollAudio();
        }

        function pollAudio() {
            if (!audioEnabled) return;
            fetch(baseUrl + '/audio/poll')
                .then(function (r) { return r.arrayBuffer(); })
                .then(function (buf) {
                    if (buf.byteLength >= 2) {
                        playPcmBuffer(buf);
                    }
                    audioPollTimer = setTimeout(pollAudio, 100);
                })
                .catch(function () {
                    audioPollTimer = setTimeout(pollAudio, 500);
                });
        }

        function playPcmBuffer(arrayBuf) {
            if (!audioCtx || !gainNode) return;

            var totalBytes = arrayBuf.byteLength - (arrayBuf.byteLength % 2);
            if (totalBytes < 2) return;

            // Keep only the latest ~250ms to avoid backlog
            var maxBytes = Math.floor(SAMPLE_RATE * 2 * 0.25);
            maxBytes -= maxBytes % 2;
            var offset = 0;
            if (totalBytes > maxBytes) {
                offset = totalBytes - maxBytes;
                offset -= offset % 2;
            }
            var useLen = totalBytes - offset;

            try {
                var int16 = new Int16Array(arrayBuf, offset, useLen / 2);
                var audioBuffer = audioCtx.createBuffer(1, int16.length, SAMPLE_RATE);
                var channel = audioBuffer.getChannelData(0);
                for (var i = 0; i < int16.length; i++) {
                    channel[i] = int16[i] / 32768.0;
                }

                var source = audioCtx.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(gainNode);

                var now = audioCtx.currentTime;
                // Reset if too far behind or ahead
                if (nextPlayTime < now || nextPlayTime > now + 0.3) {
                    nextPlayTime = now + 0.01;
                }
                source.start(nextPlayTime);
                nextPlayTime += audioBuffer.duration;
            } catch (e) {
                // skip corrupt chunk
            }
        }

        function stopAudio() {
            if (audioPollTimer) {
                clearTimeout(audioPollTimer);
                audioPollTimer = null;
            }
        }

        btnAudio.addEventListener('click', function () {
            audioEnabled = !audioEnabled;
            btnAudio.classList.toggle('active', audioEnabled);
            if (audioEnabled) {
                startAudio();
            } else {
                stopAudio();
            }
        });

        volumeSlider.addEventListener('input', function () {
            var val = parseInt(this.value);
            volumeValue.textContent = val + '%';
            if (gainNode) {
                gainNode.gain.value = val / 100;
            }
        });

        // ── Zoom (+/- buttons, 0.2 step) ────────────────────────
        function sendZoom(action) {
            fetch(baseUrl + '/api/zoom?action=' + action, { method: 'POST' })
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    currentZoom = data.zoom;
                    zoomDisplay.textContent = currentZoom.toFixed(1) + 'x';
                })
                .catch(function () {});
        }

        btnZoomIn.addEventListener('click', function () { sendZoom('in'); });
        btnZoomOut.addEventListener('click', function () { sendZoom('out'); });
        btnZoomReset.addEventListener('click', function () { sendZoom('reset'); });

        // ── Rotate ──────────────────────────────────────────────
        btnRotate.addEventListener('click', function () {
            fetch(baseUrl + '/api/rotate', { method: 'POST' })
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    rotation = data.rotation || 0;
                    videoFeed.style.transform = 'rotate(' + rotation + 'deg)';
                })
                .catch(function () {});
        });

        // ── Flash ───────────────────────────────────────────────
        btnFlash.addEventListener('click', function () {
            fetch(baseUrl + '/api/flash', { method: 'POST' })
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    flashEnabled = data.flash;
                    btnFlash.classList.toggle('active', flashEnabled);
                })
                .catch(function () {});
        });

        // ── Switch Camera ───────────────────────────────────────
        btnSwitch.addEventListener('click', function () {
            fetch(baseUrl + '/api/switch', { method: 'POST' }).catch(function () {});
        });

        // ── Resolution ──────────────────────────────────────────
        resButtons.forEach(function (btn) {
            btn.addEventListener('click', function () {
                var res = this.getAttribute('data-res');
                fetch(baseUrl + '/api/resolution?value=' + res, { method: 'POST' })
                    .then(function (r) { return r.json(); })
                    .then(function (data) {
                        resButtons.forEach(function (b) { b.classList.remove('active'); });
                        var active = document.querySelector('.res-btn[data-res="' + data.resolution + '"]');
                        if (active) active.classList.add('active');
                    })
                    .catch(function () {});
            });
        });

        // ── Status polling ──────────────────────────────────────
        function pollStatus() {
            fetch(baseUrl + '/api/status')
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    infoClients.textContent = 'Clients: ' + (data.clients || 0);
                    currentZoom = data.zoom || 1;
                    zoomDisplay.textContent = currentZoom.toFixed(1) + 'x';
                })
                .catch(function () {})
                .finally(function () {
                    setTimeout(pollStatus, 3000);
                });
        }

        // ── VU Meter ─────────────────────────────────────────────
        var vuSegments = [];
        var VU_COUNT = 20;
        var smoothedLevel = -60;

        (function initVuMeter() {
            var meter = document.getElementById('vuMeter');
            for (var i = 0; i < VU_COUNT; i++) {
                var seg = document.createElement('div');
                seg.className = 'vu-seg';
                if (i < 12) seg.classList.add('g');
                else if (i < 17) seg.classList.add('y');
                else seg.classList.add('r');
                meter.appendChild(seg);
                vuSegments.push(seg);
            }
        })();

        function updateVuMeter(db) {
            smoothedLevel = smoothedLevel + 0.5 * (db - smoothedLevel);
            var norm = (smoothedLevel + 60) / 60;
            if (norm < 0) norm = 0;
            if (norm > 1) norm = 1;
            var active = Math.round(norm * VU_COUNT);
            for (var i = 0; i < VU_COUNT; i++) {
                vuSegments[i].classList.toggle('lit', i < active);
            }
        }

        function pollAudioLevel() {
            fetch(baseUrl + '/api/audio-level')
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    updateVuMeter(data.level);
                })
                .catch(function () {});
            setTimeout(pollAudioLevel, 100);
        }

        connectVideo();
        pollStatus();
        pollAudioLevel();
    </script>
</body>
</html>
